<body>
    <header>
        <h1 class="visually-hidden">Clippy: First Blood - SNES Style Run & Gun Browser Game</h1>
    </header>

    <main>
        <article class="game-wrapper" itemscope itemtype="https://schema.org/VideoGame">
            <meta itemprop="name" content="Clippy: First Blood">
            <meta itemprop="description" content="A retro SNES-style run and gun browser game">

            <section class="crt-container" aria-label="Game Canvas">
                <canvas id="gameCanvas" width="256" height="224" role="img" aria-label="Clippy: First Blood game screen - SNES style pixel art run and gun gameplay"></canvas>
                <div class="crt-overlay" aria-hidden="true"></div>
                <div class="scanlines" aria-hidden="true"></div>
            </section>

            <aside class="game-controls" aria-labelledby="controls-heading">
                <h2 id="controls-heading">CONTROLS</h2>
                <dl class="control-list">
                    <div class="control-group">
                        <dt><strong>Movement:</strong></dt>
                        <dd>Arrow Keys / WASD</dd>
                    </div>
                    <div class="control-group">
                        <dt><strong>Jump:</strong></dt>
                        <dd>Space / Z</dd>
                    </div>
                    <div class="control-group">
                        <dt><strong>Shoot:</strong></dt>
                        <dd>X / Ctrl</dd>
                    </div>
                    <div class="control-group">
                        <dt><strong>Lock Aim:</strong></dt>
                        <dd>Shift (hold)</dd>
                    </div>
                    <div class="control-group">
                        <dt><strong>Take Cover:</strong></dt>
                        <dd>C (near cover spot)</dd>
                    </div>
                    <div class="control-group">
                        <dt><strong>Prone:</strong></dt>
                        <dd>Down + Down (double tap)</dd>
                    </div>
                </dl>
            </aside>
        </article>
    </main>
