<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clippy: First Blood</title>
    <meta name="description" content="A dark, Contra-style run-and-gun starring Clippy on a revenge tour through Microsoft's history. Free browser game.">
    <meta name="theme-color" content="#0a0612">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23000'/><path d='M5 3v8a2 2 0 002 2h2a2 2 0 002-2V7H8' stroke='%23ddd' stroke-width='1.2' fill='none'/><path d='M5 3v10' stroke='%23c00' stroke-width='1.2'/></svg>">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="crt">
        <canvas id="screen" width="256" height="224"></canvas>
        <div id="scanlines"></div>
        <div id="vignette"></div>
        <div id="touch-overlay" aria-hidden="true">
            <div class="dpad">
                <div class="dpad-btn dpad-up"    data-act="up">▲</div>
                <div class="dpad-btn dpad-left"  data-act="left">◀</div>
                <div class="dpad-btn dpad-right" data-act="right">▶</div>
                <div class="dpad-btn dpad-down"  data-act="down">▼</div>
            </div>
            <div class="actions">
                <div class="act-btn act-jump"    data-act="jump">A</div>
                <div class="act-btn act-shoot"   data-act="shoot">B</div>
                <div class="act-btn act-special" data-act="special">C</div>
            </div>
            <div class="act-btn act-pause" data-act="pause">≡</div>
        </div>
    </div>
    <div id="hint">Z jump · X shoot · C special · V grenade · arrows move · ↑ hide · ↓+Z slide · P pause · M mute</div>
    <noscript>
        <p style="color:#fff;text-align:center;padding:2rem">This game needs JavaScript. Sorry.</p>
    </noscript>
    <script type="module" src="src/main.js"></script>
</body>
</html>
